<!DOCTYPE html>
<html>
<head>
    <title>Company Profile</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;
        }

        /* 🔥 HERO SECTION (dito lalagay background) */
        .hero {
            position: relative;
            background-image: url('background.jpg'); /* PALITAN mo name kung iba */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 80px 20px;
            text-align: center;
        }

        /* 🔥 DARK OVERLAY para malinaw text */
        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        h1 {
            margin: 10px 0;
        }

        .btn {
            display: inline-block;
            margin: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #00c6ff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        iframe {
            width: 95%;
            height: 60vh;
            border: none;
            border-radius: 10px;
            margin-bottom: 40px;
        }

        /* CHAT DESIGN (unchanged pero inayos spacing) */
        .chat-container {
            width: 320px;
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-family: Arial, sans-serif;
        }

        .chat-header {
            background: #007bff;
            color: white;
            padding: 12px;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
        }

        .chat-body {
            display: none;
            background: #f9f9f9;
            padding: 15px;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 10px 10px;
        }

        .chat-body input,
        .chat-body textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .chat-body button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .chat-body button:hover {
            background: #0056b3;
        }

        .chat-intro {
            font-size: 13px;
            margin-bottom: 10px;
            color: #555;
        }
    </style>
</head>

<body>

<!-- 🔥 HERO SECTION WITH BACKGROUND -->
<div class="hero">
    <div class="hero-content">

        <img src="logo.png" alt="Company Logo"
             style="width:500px; max-width:90%;">

        <h1>Company Profile</h1>

        <a href="presentation.pdf" class="btn" target="_blank">
            📄 Open Full Screen
        </a>

    </div>
</div>

<!-- PDF VIEW -->
<div style="text-align:center;">
    <iframe src="presentation.pdf"></iframe>
</div>

<!-- CHAT -->
<div class="chat-container">
  <div class="chat-header" onclick="toggleChat()">
    💬 Chat with Us
  </div>

  <div class="chat-body" id="chatBox">
    <div class="chat-intro">
      Hello 👋 Please leave your inquiry and we will email you back.
    </div>

    <form action="https://formspree.io/f/xpqollyz" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="4" placeholder="Type your message..." required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>
</div>

<script>
function toggleChat() {
  var chat = document.getElementById("chatBox");
  chat.style.display = chat.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
