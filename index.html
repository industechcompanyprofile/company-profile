<body style="margin:0; font-family: Arial, sans-serif; background: linear-gradient(to right, #0f2027, #2c5364);">

    <!-- LOGO + TITLE -->
    <div style="text-align:center; padding:20px 10px 10px 10px;">
        
        <img src="logo.png" alt="Company Logo"
        style="width:500px; max-width:90%; display:block; margin:0 auto;">

        <h1 style="color:white; margin-top:10px; margin-bottom:5px;">
            Company Profile
        </h1>

    </div>

    <!-- BUTTON -->
    <div style="text-align:center; margin-bottom:15px;">
        <a href="presentation.pdf" target="_blank"
        style="background:#00bcd4; color:white; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:bold;">
            📄 Open Full Screen
        </a>
    </div>

    <!-- PDF VIEW -->
    <div style="display:flex; justify-content:center;">
        <iframe src="presentation.pdf"
        style="width:90%; height:75vh; border:none; border-radius:10px;">
        </iframe>
    </div>

</body>
