<!DOCTYPE html>
<html>
<head>
    <title>Company Profile</title>

    <!-- para responsive sa phone -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            text-align: center;
            color: white;
        }

        h1 {
            padding-top: 20px;
        }

        /* malaking button */
        .btn {
            display: inline-block;
            margin: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #00c6ff;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }

        iframe {
            width: 95%;
            height: 70vh;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>Company Profile</h1>

<!-- MALAKING BUTTON -->
<a href="presentation.pdf" class="btn" target="_blank">
    📄 Open Full Screen
</a>

<!-- PDF VIEW -->
<iframe src="presentation.pdf"></iframe>

</body>
</html>
